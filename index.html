<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Combinaciones Animadas</title>
<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    overflow:hidden;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

.left{
    width:40%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,0.3);
}

.right{
    width:60%;
    position:relative;
}

.personaje{
    width:150px;
    height:150px;
    background:#f6c23e;
    border-radius:50%;
    animation: respirar 2s infinite;
}

@keyframes respirar{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.subtitulo{
    margin-top:20px;
    font-size:18px;
    min-height:60px;
    text-align:center;
}

.objeto{
    position:absolute;
    padding:15px;
    background:#36b9cc;
    border-radius:10px;
    font-weight:bold;
    transition:all 1s ease;
}

#obj1{top:150px; left:200px;}
#obj2{top:150px; left:400px;}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="left">
    <div class="personaje"></div>
    <div class="subtitulo" id="texto"></div>
    <button onclick="iniciar()">Explicar</button>
</div>

<div class="right">
    <div class="objeto" id="obj1">Camisa</div>
    <div class="objeto" id="obj2">Pantalón</div>
</div>

</div>

<script>

let frases = [
"Una combinación es una forma de elegir elementos.",
"En una combinación el orden NO importa.",
"Observa cómo cambian de lugar...",
"Pero sigue siendo el mismo grupo."
];

let i = 0;

function iniciar(){
    let intervalo = setInterval(()=>{
        document.getElementById("texto").innerText = frases[i];
        
        if(i === 2){
            intercambiar();
        }

        i++;
        if(i >= frases.length){
            clearInterval(intervalo);
        }

    },3000);
}

function intercambiar(){
    let o1 = document.getElementById("obj1");
    let o2 = document.getElementById("obj2");

    o1.style.left = "400px";
    o2.style.left = "200px";
}

</script>

</body>
</html>
